<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__BRAND_NAME__ — __TAGLINE__</title>
<meta name="description" content="__META_DESCRIPTION__">
<meta property="og:title" content="__BRAND_NAME__ — __TAGLINE__">
<meta property="og:description" content="__META_DESCRIPTION__">
<meta property="og:type" content="website">
<style>
  :root{
    --bg:#0a0a0f; --panel:#13131c; --line:#232332;
    --accent:#6366F1; --accent2:#34D399; --text:#E6E6F0; --dim:#8B8B9E;
    --sans:system-ui,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#fafafc; --panel:#ffffff; --line:#e4e4ec; --text:#15151f; --dim:#5c5c70; }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:auto} /* Lenis owns smooth scroll when active */
  body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  .wrap{max-width:1100px;margin:0 auto;padding:0 24px}
  section{padding:96px 0}

  /* ---------- nav ---------- */
  nav{position:sticky;top:0;z-index:20;border-bottom:1px solid transparent;background:transparent;transition:background .3s,border-color .3s}
  nav.scrolled{background:rgba(10,10,15,.75);backdrop-filter:blur(10px);border-color:var(--line)}
  @media (prefers-color-scheme: light){ nav.scrolled{background:rgba(250,250,252,.8)} }
  .navrow{display:flex;align-items:center;gap:20px;padding:18px 24px;max-width:1100px;margin:0 auto}
  .logo{font-weight:700;letter-spacing:-.5px;font-size:18px}
  .navrow .sp{flex:1}
  .navrow a.link{color:var(--dim);font-size:14px}
  .navrow a.link:hover{color:var(--text)}

  /* ---------- buttons ---------- */
  .btn{display:inline-block;position:relative;padding:15px 28px;border-radius:10px;font-size:15px;font-weight:600;transition:transform .25s ease,box-shadow .25s ease}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.primary:hover{box-shadow:0 0 0 6px rgba(99,102,241,.18)}
  .btn.ghost{border:1px solid var(--line);color:var(--text)}
  .btn.ghost:hover{border-color:var(--accent)}
  .magnetic{will-change:transform}

  /* ---------- hero ---------- */
  header.hero{position:relative;padding:120px 0 90px;text-align:center;overflow:hidden}
  .hero-bg{position:absolute;inset:-10% -10% auto -10%;height:130%;z-index:-1;pointer-events:none}
  .hero-bg .layer{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35}
  .hero-bg .l1{width:520px;height:520px;background:var(--accent);top:-120px;left:8%}
  .hero-bg .l2{width:420px;height:420px;background:var(--accent2);top:60px;right:6%;opacity:.22}
  h1{font-size:clamp(36px,7vw,74px);font-weight:800;letter-spacing:-2px;line-height:1.05;margin-bottom:26px}
  h1 .word{display:inline-block;overflow:hidden;vertical-align:top}
  h1 .word span{display:inline-block;will-change:transform}
  h1 .accent{color:var(--accent)}
  .hero .sub{color:var(--dim);font-size:clamp(16px,2.1vw,20px);max-width:600px;margin:0 auto 38px}
  .hero .cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .scroll-cue{margin-top:70px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--dim);font-size:12px;letter-spacing:2px;text-transform:uppercase}
  .scroll-cue .dot{width:1px;height:34px;background:linear-gradient(var(--dim),transparent);animation:scrollcue 1.8s ease-in-out infinite}
  @keyframes scrollcue{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

  /* ---------- reveal ---------- */
  .reveal{opacity:0;transform:translateY(28px)}
  .reveal.in{opacity:1;transform:none;transition:opacity .7s ease,transform .7s ease}

  /* ---------- value props ---------- */
  .props{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:28px}
  .prop{padding:8px 4px}
  .prop .n{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:12px}
  .prop h3{font-size:21px;margin-bottom:10px}
  .prop p{color:var(--dim);font-size:15px}

  h2{font-size:clamp(28px,4.5vw,44px);font-weight:800;letter-spacing:-1px;margin-bottom:14px}
  .lead{color:var(--dim);max-width:560px;font-size:17px;margin-bottom:44px}

  /* ---------- pinned product showcase ---------- */
  .showcase{position:relative}
  .showcase-pin{min-height:100vh;display:flex;align-items:center;padding:60px 0}
  .showcase-grid{display:grid;grid-template-columns:1fr;gap:20px;width:100%}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:30px;transition:transform .3s ease,border-color .3s ease}
  .pcard:hover{transform:translateY(-6px);border-color:var(--accent)}
  .pcard .tag{display:inline-block;font-size:12px;color:var(--accent2);border:1px solid var(--line);border-radius:6px;padding:3px 10px;margin-bottom:14px}
  .pcard h3{font-size:20px;margin-bottom:8px}
  .pcard p{color:var(--dim);font-size:14.5px;margin-bottom:16px}
  .pcard .price{font-weight:700;font-size:18px}
  @media(min-width:720px){ .showcase-grid{grid-template-columns:repeat(3,1fr)} }

  /* ---------- testimonial ---------- */
  .testi{text-align:center;max-width:680px;margin:0 auto}
  .testi blockquote{font-size:clamp(20px,3vw,28px);font-weight:600;letter-spacing:-.5px;margin-bottom:20px}
  .testi cite{color:var(--dim);font-style:normal;font-size:14px}

  /* ---------- email capture ---------- */
  .capture{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:52px 36px;text-align:center}
  .capture form{display:flex;gap:10px;max-width:420px;margin:26px auto 0;flex-wrap:wrap;justify-content:center}
  .capture input[type=email]{flex:1;min-width:220px;padding:14px 16px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:15px}
  .capture input[type=email]:focus{outline:2px solid var(--accent)}

  footer{padding:44px 0;text-align:center;color:var(--dim);font-size:13px;border-top:1px solid var(--line)}

  /* ---------- sticky CTA ---------- */
  .sticky-cta{position:fixed;left:0;right:0;bottom:-100px;z-index:30;display:flex;justify-content:center;padding:16px;transition:bottom .35s ease}
  .sticky-cta.show{bottom:0}
  .sticky-cta .inner{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:16px;box-shadow:0 12px 40px -12px rgba(0,0,0,.5)}
  .sticky-cta span{font-size:14px;font-weight:600}

  /* ---------- reduced motion: everything visible, no animation ---------- */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
    .reveal{opacity:1!important;transform:none!important}
    h1 .word span{transform:none!important}
    .hero-bg .layer{display:none}
    .scroll-cue .dot{animation:none}
  }
</style>
</head>
<body>

<nav id="nav"><div class="navrow">
  <span class="logo" id="cfgLogo"></span>
  <span class="sp"></span>
  <a class="link" href="#value">Why</a>
  <a class="link" href="#products">Products</a>
  <a class="btn primary magnetic" id="navCta" href="#products">Get started</a>
</div></nav>

<header class="hero">
  <div class="hero-bg"><div class="layer l1"></div><div class="layer l2"></div></div>
  <div class="wrap">
    <h1 id="heroHeadline"></h1>
    <p class="sub reveal" id="heroSub"></p>
    <div class="cta-row reveal">
      <a class="btn primary magnetic" id="heroCta" href="#products"></a>
      <a class="btn ghost" href="#value">Learn more</a>
    </div>
    <div class="scroll-cue"><span>Scroll</span><span class="dot"></span></div>
  </div>
</header>

<section class="wrap" id="value">
  <h2 class="reveal">Why it's different</h2>
  <p class="lead reveal">Three reasons this isn't like the rest.</p>
  <div class="props" id="propsGrid"></div>
</section>

<section class="showcase wrap" id="products">
  <div class="showcase-pin">
    <div style="width:100%">
      <h2 class="reveal">The lineup</h2>
      <p class="lead reveal" id="productsLead"></p>
      <div class="showcase-grid" id="productGrid"></div>
    </div>
  </div>
</section>

<section class="wrap" id="testimonial-section">
  <div class="testi reveal">
    <blockquote id="testiQuote"></blockquote>
    <cite id="testiAuthor"></cite>
  </div>
</section>

<section class="wrap">
  <div class="capture reveal">
    <h2 id="captureHeadline">Stay in the loop</h2>
    <p class="lead" style="margin:10px auto 0" id="captureSub">No spam, just the good stuff.</p>
    <form id="captureForm" method="POST">
      <input type="email" name="email" placeholder="you@email.com" required>
      <button type="submit" class="btn primary">Subscribe</button>
    </form>
  </div>
</section>

<footer class="wrap" id="footerText"></footer>

<div class="sticky-cta" id="stickyCta">
  <div class="inner">
    <span id="stickyCtaText"></span>
    <a class="btn primary magnetic" id="stickyCtaBtn" href="#products"></a>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — the ONLY section a stamping agent should edit.
   ============================================================ */
const CONFIG = {
  brand: "Brand Name",
  tagline: "A short, punchy tagline",
  metaDescription: "One or two sentences describing the offering for search engines and social previews.",
  palette: { accent: "#6366F1", accent2: "#34D399" }, // optional override of --accent/--accent2
  hero: {
    headline: "A kinetic headline that <em>reveals</em> word by word",
    sub: "Supporting copy that explains the promise in one or two sentences.",
    ctaText: "Get started",
    ctaHref: "#products"
  },
  valueProps: [
    { n: "01", h: "First reason", p: "Why this matters to the buyer, in one line." },
    { n: "02", h: "Second reason", p: "Why this matters to the buyer, in one line." },
    { n: "03", h: "Third reason", p: "Why this matters to the buyer, in one line." }
  ],
  productsLead: "Pick the one that fits.",
  products: [
    { tag: "starter", name: "Product One", desc: "Short description of the offering.", price: "$9", href: "#" },
    { tag: "popular", name: "Product Two", desc: "Short description of the offering.", price: "$19", href: "#" },
    { tag: "pro", name: "Product Three", desc: "Short description of the offering.", price: "$29", href: "#" }
  ],
  testimonial: { quote: "This changed how I work.", author: "— A happy customer" },
  cta: { text: "Get started", href: "#products" },
  capture: { headline: "Stay in the loop", sub: "No spam, just the good stuff.", formAction: "#" },
  footer: "© 2026 Brand Name. All rights reserved."
};
/* ============================================================ */

// ---- apply palette ----
document.documentElement.style.setProperty('--accent', CONFIG.palette.accent);
document.documentElement.style.setProperty('--accent2', CONFIG.palette.accent2);

// ---- render config into DOM ----
document.getElementById('cfgLogo').textContent = CONFIG.brand;
document.title = CONFIG.brand + ' — ' + CONFIG.tagline;

const heroH1 = document.getElementById('heroHeadline');
heroH1.innerHTML = CONFIG.hero.headline.split(' ').map(w =>
  `<span class="word"><span>${w}</span></span>`
).join(' ');

document.getElementById('heroSub').textContent = CONFIG.hero.sub;
const heroCta = document.getElementById('heroCta');
heroCta.textContent = CONFIG.hero.ctaText;
heroCta.href = CONFIG.hero.ctaHref;
document.getElementById('navCta').textContent = CONFIG.cta.text;
document.getElementById('navCta').href = CONFIG.cta.href;

document.getElementById('propsGrid').innerHTML = CONFIG.valueProps.map(v =>
  `<div class="prop reveal"><div class="n">${v.n}</div><h3>${v.h}</h3><p>${v.p}</p></div>`
).join('');

document.getElementById('productsLead').textContent = CONFIG.productsLead;
document.getElementById('productGrid').innerHTML = CONFIG.products.map(p =>
  `<div class="pcard reveal">
     <span class="tag">${p.tag}</span>
     <h3>${p.name}</h3>
     <p>${p.desc}</p>
     <div class="price">${p.price}</div>
     <a class="btn ghost" style="margin-top:14px;width:100%;text-align:center" href="${p.href}">Get it</a>
   </div>`
).join('');

document.getElementById('testiQuote').textContent = '"' + CONFIG.testimonial.quote + '"';
document.getElementById('testiAuthor').textContent = CONFIG.testimonial.author;

document.getElementById('captureHeadline').textContent = CONFIG.capture.headline;
document.getElementById('captureSub').textContent = CONFIG.capture.sub;
document.getElementById('captureForm').action = CONFIG.capture.formAction;

document.getElementById('footerText').textContent = CONFIG.footer;

const stickyText = document.getElementById('stickyCtaText');
stickyText.textContent = CONFIG.brand;
const stickyBtn = document.getElementById('stickyCtaBtn');
stickyBtn.textContent = CONFIG.cta.text;
stickyBtn.href = CONFIG.cta.href;

// meta description / OG (already stamped in <head> as placeholders — overwrite live too)
document.querySelector('meta[name="description"]').setAttribute('content', CONFIG.metaDescription);
document.querySelector('meta[property="og:title"]').setAttribute('content', CONFIG.brand + ' — ' + CONFIG.tagline);
document.querySelector('meta[property="og:description"]').setAttribute('content', CONFIG.metaDescription);
</script>

<!-- ============ Motion (CDN, MIT/free) ============ -->
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
<script>
(function(){
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // nav background on scroll
  const nav = document.getElementById('nav');
  const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 40);
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  // sticky CTA appears after hero exits viewport
  const hero = document.querySelector('header.hero');
  const stickyCta = document.getElementById('stickyCta');
  const heroObserver = new IntersectionObserver(([entry]) => {
    stickyCta.classList.toggle('show', !entry.isIntersecting);
  }, { threshold: 0 });
  heroObserver.observe(hero);

  if (reduced || typeof gsap === 'undefined') {
    // Accessibility: no GSAP/Lenis, no motion — everything already visible via CSS defaults.
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
    return;
  }

  gsap.registerPlugin(ScrollTrigger);

  // Lenis smooth scroll wired to ScrollTrigger
  const lenis = new Lenis({ duration: 1.1, smoothWheel: true });
  lenis.on('scroll', ScrollTrigger.update);
  gsap.ticker.add((time) => lenis.raf(time * 1000));
  gsap.ticker.lagSmoothing(0);

  // kinetic headline: stagger word reveal on load
  gsap.set('h1#heroHeadline .word span', { yPercent: 110, opacity: 0 });
  gsap.to('h1#heroHeadline .word span', {
    yPercent: 0, opacity: 1, duration: 0.9, stagger: 0.06, ease: 'power3.out', delay: 0.15
  });
  gsap.to('.hero .sub, .hero .cta-row', { opacity: 1, y: 0, duration: 0.8, delay: 0.5, ease: 'power2.out' });

  // hero parallax layers
  gsap.to('.hero-bg .l1', { y: 120, ease: 'none', scrollTrigger: { trigger: 'header.hero', start: 'top top', end: 'bottom top', scrub: true } });
  gsap.to('.hero-bg .l2', { y: -80, ease: 'none', scrollTrigger: { trigger: 'header.hero', start: 'top top', end: 'bottom top', scrub: true } });

  // scroll reveals — fade+rise, ONCE, no scroll-jacking
  document.querySelectorAll('.reveal').forEach(el => {
    ScrollTrigger.create({
      trigger: el,
      start: 'top 85%',
      once: true,
      onEnter: () => el.classList.add('in')
    });
  });

  // magnetic CTA hover
  document.querySelectorAll('.magnetic').forEach(btn => {
    btn.addEventListener('mousemove', (e) => {
      const r = btn.getBoundingClientRect();
      const x = (e.clientX - r.left - r.width / 2) * 0.3;
      const y = (e.clientY - r.top - r.height / 2) * 0.3;
      gsap.to(btn, { x, y, duration: 0.3, ease: 'power2.out' });
    });
    btn.addEventListener('mouseleave', () => gsap.to(btn, { x: 0, y: 0, duration: 0.4, ease: 'elastic.out(1,0.4)' }));
  });
})();
</script>
</body>
</html>
