<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>TikTok Authorization — Penloom Studio</title>
<meta name="robots" content="noindex">
<style>body{margin:0;font:16px/1.65 -apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#1d2330;background:#f7f7f4}.wrap{max-width:760px;margin:0 auto;padding:40px 20px}h1{font-size:26px}code{background:#eceff4;padding:2px 6px;border-radius:4px;word-break:break-all}.muted{color:#5b6472}</style>
</head><body><div class="wrap">
<h1>TikTok Authorization</h1>
<p>Authorization step received. You can close this window.</p>
<p id="code" class="muted"></p>
<script>
// If TikTok redirected here with an authorization code, show it so the owner can copy it
// into the token-exchange step. Shown locally in the browser only — nothing is sent anywhere.
var p = new URLSearchParams(location.search);
if (p.get("code")) document.getElementById("code").innerHTML =
  "Authorization code (copy this for the setup step):<br><code>" + p.get("code").replace(/[<>&"]/g, "") + "</code>";
</script>
<p><a href="/">← Back to Penloom</a> · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p>
</div></body></html>
